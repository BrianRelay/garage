<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Garage</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F4F0E5; --card:#FFFFFF; --ink:#26231C; --muted:#8A8171; --line:#E7E0CF;
    --sage:#E6EBD8; --terra:#F5E1D0; --sand:#EFE6CE; --stone:#E9E3D8;
    --forest:#31402F; --forest-ink:#EAEEDD;
    --red:#B4543E; --amber:#A87F26; --green:#58754A; --gray:#A29A88;
    --radius:18px; --radius-sm:12px;
    --sans:"DM Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom)}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:16px 22px;background:var(--bg);position:sticky;top:0;z-index:20}
  .brand{font-size:17px;font-weight:800;letter-spacing:-.02em;cursor:pointer;text-decoration:none;color:var(--ink);
    display:flex;align-items:center;gap:8px}
  .brand .bdot{width:10px;height:10px;border-radius:50%;background:var(--terra);border:3px solid #DFA679}
  .sync-pill{font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;
    padding:6px 12px;border-radius:99px;background:var(--card);white-space:nowrap;box-shadow:0 1px 3px rgba(70,60,40,.06)}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gray);flex:none}
  .sync-dot.ok{background:var(--green)} .sync-dot.busy{background:var(--amber)} .sync-dot.err{background:var(--red)}
  main{max-width:1060px;margin:0 auto;padding:10px 22px 90px}

  h1{font-size:34px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
  h2{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);
    display:flex;align-items:center;gap:7px;margin-bottom:8px}
  .eyebrow::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--forest)}
  .sub{color:var(--muted);font-size:14px}
  .accent-dot{color:#C0784F}

  .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:99px;border:1px solid var(--line);
    background:var(--card);color:var(--ink);font-size:13.5px;font-weight:600;font-family:var(--sans);cursor:pointer;text-decoration:none}
  .btn:hover{border-color:#cbc2ab}
  .btn.primary{background:var(--forest);color:var(--forest-ink);border-color:var(--forest)}
  .btn.small{padding:5px 12px;font-size:12.5px}
  .btn.danger{color:var(--red);border-color:#e3c4bf}

  /* ===== dashboard ===== */
  .hero{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin:14px 0 22px}
  .ov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:26px}
  .ov{border-radius:var(--radius);padding:16px 18px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between}
  .ov .l{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(38,35,28,.55)}
  .ov .n{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.05;margin:6px 0 2px}
  .ov .d{font-size:12.5px;color:rgba(38,35,28,.6)}
  .ov.sage{background:var(--sage)} .ov.terra{background:var(--terra)} .ov.sand{background:var(--sand)} .ov.stone{background:var(--stone)}
  .ov .n .unit{font-size:16px;font-weight:700;color:rgba(38,35,28,.5)}

  .cars-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:14px;margin-bottom:26px}
  .car-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;
    box-shadow:0 1px 3px rgba(70,60,40,.05);transition:transform .12s, box-shadow .12s;display:flex;flex-direction:column}
  .car-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(70,60,40,.12)}
  .car-photo{height:118px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .car-photo img{width:100%;height:100%;object-fit:cover}
  .car-photo svg{width:82%;max-height:92px}
  .car-body{padding:13px 15px 15px;display:flex;flex-direction:column;gap:8px;flex:1}
  .mono-chip{display:inline-flex;align-items:center;justify-content:center;min-width:38px;height:24px;padding:0 8px;
    border-radius:8px;color:#fff;font-size:12px;font-weight:800;letter-spacing:.06em}
  .car-name{font-size:15.5px;font-weight:700;letter-spacing:-.01em;line-height:1.2}
  .car-miles{font-size:12.5px;color:var(--muted)}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .badge.red{background:#F3DCD5;color:var(--red)} .badge.amber{background:#F0E6C8;color:var(--amber)} .badge.green{background:#E2EAD8;color:var(--green)}
  .car-card .row{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .quicklog{font-size:12px;font-weight:700;color:var(--forest);background:none;border:none;cursor:pointer;padding:0}
  .quicklog:hover{text-decoration:underline}

  .charts-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-bottom:26px}
  .panel{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:0 1px 3px rgba(70,60,40,.05)}
  .panel h2{margin-bottom:4px}
  .panel .cap{font-size:12px;color:var(--muted);margin-bottom:14px}
  .span7{grid-column:span 7} .span5{grid-column:span 5} .span6{grid-column:span 6} .span12{grid-column:span 12}
  @media(max-width:800px){.span7,.span5,.span6{grid-column:span 12}}

  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block}

  .hrow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .hrow .hl{width:46px;font-size:12px;font-weight:700;flex:none;text-align:right}
  .hrow .track{flex:1;height:14px;background:#F1EDE2;border-radius:99px;overflow:hidden}
  .hrow .fill{height:100%;border-radius:99px;min-width:4px}
  .hrow .hv{font-size:12px;color:var(--muted);flex:none;width:150px}
  @media(max-width:520px){.hrow .hv{width:auto}}

  .dark-card{background:var(--forest);color:var(--forest-ink);border-radius:var(--radius);padding:20px}
  .dark-card .l{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(234,238,221,.6)}
  .dark-card .big{font-size:34px;font-weight:800;letter-spacing:-.03em;margin:4px 0 12px}
  .dark-row{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;font-size:13.5px;
    border-top:1px solid rgba(234,238,221,.15)}
  .dark-row b{font-weight:700}

  .donut-wrap{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .donut-legend{display:flex;flex-direction:column;gap:6px;font-size:12.5px;flex:1;min-width:140px}
  .donut-legend div{display:flex;align-items:center;gap:7px;justify-content:space-between}
  .donut-legend .lft{display:flex;align-items:center;gap:7px;color:var(--muted)}
  .donut-legend i{width:9px;height:9px;border-radius:3px;display:inline-block;flex:none}

  /* upcoming */
  .up-group{margin-bottom:16px}
  .up-title{font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;color:var(--muted)}
  .up-title.red{color:var(--red)}
  .up-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:var(--radius-sm);
    padding:10px 14px;margin-bottom:6px;cursor:pointer;box-shadow:0 1px 2px rgba(70,60,40,.04)}
  .up-row:hover{box-shadow:0 3px 10px rgba(70,60,40,.1)}
  .up-when{width:86px;flex:none;font-size:12.5px;font-weight:700}
  .up-when.red{color:var(--red)}
  .up-what{flex:1;font-size:14px;font-weight:600}
  .up-det{font-size:12px;color:var(--muted);flex:2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  @media(max-width:640px){.up-det{display:none}}

  /* ===== car page ===== */
  .crumb{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;display:inline-block;margin:6px 0 14px}
  .crumb:hover{color:var(--ink)}
  .chero{display:flex;gap:18px;align-items:stretch;flex-wrap:wrap;margin-bottom:18px}
  .chero-photo{width:290px;min-height:170px;border-radius:var(--radius);overflow:hidden;position:relative;flex:none;
    display:flex;align-items:center;justify-content:center}
  .chero-photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .chero-photo svg{width:82%}
  .chero-photo .photobtn{position:absolute;bottom:10px;right:10px;font-size:11.5px;font-weight:700;background:rgba(255,255,255,.92);
    border:none;border-radius:99px;padding:5px 11px;cursor:pointer;color:var(--ink)}
  @media(max-width:640px){.chero-photo{width:100%}}
  .chero-info{flex:1;min-width:250px;display:flex;flex-direction:column;justify-content:center;gap:8px}
  .chero-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:6px 0 28px}
  .stat{border-radius:var(--radius-sm);padding:12px 16px}
  .stat.sage{background:var(--sage)} .stat.terra{background:var(--terra)} .stat.sand{background:var(--sand)} .stat.stone{background:var(--stone)}
  .stat .n{font-size:21px;font-weight:800;letter-spacing:-.02em}
  .stat .l{font-size:11px;font-weight:700;color:rgba(38,35,28,.5);text-transform:uppercase;letter-spacing:.08em}

  section{margin-bottom:34px}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .sched{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 3px rgba(70,60,40,.05)}
  .sched-row{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid #F0EBDF;flex-wrap:wrap}
  .sched-row:last-child{border-bottom:none}
  .sched-row .what{font-weight:700;min-width:150px;font-size:14px}
  .sched-row .last{color:var(--muted);font-size:12.5px;flex:1;min-width:180px}
  .pill{font-size:12px;font-weight:700;padding:4px 11px;border-radius:99px;white-space:nowrap}
  .pill.red{background:#F3DCD5;color:var(--red)} .pill.amber{background:#F0E6C8;color:var(--amber)}
  .pill.green{background:#E2EAD8;color:var(--green)} .pill.gray{background:#EDE9DE;color:var(--muted)}

  .filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
  .chip{font-size:12.5px;font-weight:600;padding:5px 13px;border-radius:99px;background:var(--card);cursor:pointer;color:var(--muted);
    box-shadow:0 1px 2px rgba(70,60,40,.05)}
  .chip.on{background:var(--forest);color:var(--forest-ink)}
  .search{padding:7px 14px;border:none;border-radius:99px;font-size:13px;background:var(--card);
    font-family:var(--sans);width:170px;color:var(--ink);box-shadow:0 1px 2px rgba(70,60,40,.05)}
  .search:focus{outline:2px solid #D8CFB8}

  .entry{background:var(--card);border-radius:var(--radius-sm);padding:14px 17px;margin-bottom:9px;cursor:pointer;
    box-shadow:0 1px 2px rgba(70,60,40,.04)}
  .entry:hover{box-shadow:0 4px 14px rgba(70,60,40,.1)}
  .e-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .e-date{font-size:12.5px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;flex:none;width:86px}
  .e-title{font-weight:700;flex:1;min-width:200px;font-size:14.5px}
  .e-cost{font-variant-numeric:tabular-nums;font-weight:800;flex:none}
  .e-meta{display:flex;gap:12px;flex-wrap:wrap;margin-top:3px;margin-left:96px;font-size:12.5px;color:var(--muted)}
  .e-notes{margin-top:6px;margin-left:96px;font-size:13.5px;color:#544D3F;white-space:pre-line}
  .e-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;margin-left:96px}
  .tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;background:#F0EBDD;color:var(--muted)}
  .e-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;margin-left:96px}
  .e-photos img{width:64px;height:64px;object-fit:cover;border-radius:10px;background:#eee}
  @media(max-width:560px){.e-meta,.e-notes,.e-tags,.e-photos{margin-left:0}}

  .details-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
  .dfield{background:var(--card);border-radius:var(--radius-sm);padding:10px 14px;box-shadow:0 1px 2px rgba(70,60,40,.04)}
  .dfield .l{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .dfield .v{font-size:14px;word-break:break-word;font-weight:500}
  .dfield .v.empty{color:#BDB5A2;font-style:italic;font-weight:400}
  .car-notes{background:var(--card);border-radius:var(--radius-sm);padding:13px 15px;margin-top:10px;
    font-size:13.5px;white-space:pre-line;word-break:break-word;box-shadow:0 1px 2px rgba(70,60,40,.04)}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(43,37,25,.5);z-index:50;display:flex;align-items:flex-start;justify-content:center;
    padding:30px 14px;overflow-y:auto}
  .modal{background:var(--bg);border-radius:22px;width:100%;max-width:560px;padding:24px;margin-bottom:40px}
  .modal h2{margin-bottom:16px;font-size:20px}
  .f-row{margin-bottom:12px}
  .f-row label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
  .f-row input[type=text],.f-row input[type=date],.f-row input[type=number],.f-row textarea,.f-row select,.f-row input[type=password]{
    width:100%;padding:10px 13px;border:1px solid var(--line);border-radius:12px;font-size:14.5px;font-family:var(--sans);
    background:var(--card);color:var(--ink)}
  .f-row textarea{min-height:80px;resize:vertical}
  .f-row input:focus,.f-row textarea:focus,.f-row select:focus{outline:none;border-color:#b9b2a0}
  .f-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:460px){.f-cols{grid-template-columns:1fr}}
  .tagpick{display:flex;gap:6px;flex-wrap:wrap}
  .tagpick label{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;background:var(--card);
    border:1px solid var(--line);border-radius:99px;padding:5px 12px;cursor:pointer;text-transform:none;letter-spacing:0;color:var(--ink);margin:0}
  .tagpick label.on{background:var(--forest);color:var(--forest-ink);border-color:var(--forest)}
  .tagpick input{display:none}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
  .modal-actions .spacer{flex:1}
  .kvrow{display:flex;gap:8px;margin-bottom:8px}
  .kvrow input{flex:1;padding:8px 11px;border:1px solid var(--line);border-radius:10px;font-size:13.5px;background:var(--card);font-family:var(--sans)}
  .kvrow .rm{border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 4px}
  .schedrow{display:grid;grid-template-columns:1.4fr 1.2fr .8fr .8fr auto;gap:6px;margin-bottom:8px;align-items:center}
  .schedrow input,.schedrow select{padding:8px 10px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:var(--card);width:100%;font-family:var(--sans)}
  .photo-edit{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .photo-edit .ph{position:relative}
  .photo-edit img{width:72px;height:72px;object-fit:cover;border-radius:10px;background:#eee}
  .photo-edit .rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--ink);
    color:#fff;border:none;font-size:11px;cursor:pointer;line-height:1}
  .hint{font-size:12px;color:var(--muted);margin-top:4px}

  /* welcome */
  .welcome{max-width:460px;margin:70px auto;text-align:center}
  .welcome h1{font-size:38px;margin-bottom:8px}
  .welcome p{color:var(--muted);margin-bottom:26px}
  .welcome .btn{width:100%;justify-content:center;margin-bottom:10px;padding:13px}

  .lightbox{position:fixed;inset:0;background:rgba(28,24,15,.92);z-index:100;display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--forest);color:var(--forest-ink);
    padding:11px 20px;border-radius:99px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1}
  .empty-note{color:var(--muted);font-size:14px;padding:20px;text-align:center;background:var(--card);
    border-radius:var(--radius);box-shadow:0 1px 2px rgba(70,60,40,.04)}
</style>
</head>
<body>
<header>
  <a class="brand" href="#/"><span class="bdot"></span>The Garage</a>
  <div class="sync-pill" onclick="A.openSettings()"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">local</span></div>
</header>
<main id="app"></main>
<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
'use strict';
/* ============ constants ============ */
const LS_DATA='garage.db', LS_GH='garage.gh', DATA_PATH='data/garage.json';
const VOCAB=[
  ['oil','Oil change'],['tire-rotation','Tire rotation'],['tires-new','New tires'],['tire-balance','Tire balance'],
  ['cabin-filter','Cabin filter'],['engine-filter','Engine air filter'],['brakes','Brakes'],['brake-fluid','Brake fluid'],
  ['battery','Battery'],['wipers','Wipers'],['windshield','Glass'],['spark-plugs','Spark plugs'],['coolant','Coolant'],
  ['belts','Belts'],['suspension','Suspension'],['repair','Repair'],['bodywork','Bodywork'],['recall','Recall'],
  ['inspection','Inspection'],['other','Other']
];
const TAGL=Object.fromEntries(VOCAB);
/* body paint for the illustrated stand-ins (until real photos are added) */
const BODY_PAINT={volvo:'#26251F', lr4:'#26251F', rx:'#F2EFE6', nx:'#F2EFE6'};
const PHOTO_BG={volvo:'var(--sand)', lr4:'var(--stone)', rx:'var(--sage)', nx:'var(--terra)'};
const DONUT_COLORS=['#5B7350','#C0784F','#B49E5A','#8A6F5B','#5E7D7A','#A29A88'];

/* ============ state ============ */
let db=null, gh=null, ghSha=null;
let pushTimer=null, pendingPhotos=[], photoCache={};
let filterTag=null, searchQ='';

try{ db=JSON.parse(localStorage.getItem(LS_DATA)||'null'); }catch(e){}
try{ gh=JSON.parse(localStorage.getItem(LS_GH)||'null'); }catch(e){}

/* ============ helpers ============ */
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid=()=> 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtMi=n=>n==null?'':Number(n).toLocaleString('en-US');
const fmtMoney=n=>n==null?'':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:(n%1?2:0),maximumFractionDigits:2});
const fmtK=n=> n>=1000 ? '$'+(n/1000).toFixed(n>=9500?0:1)+'k' : '$'+Math.round(n);
const fmtDate=(iso,approx)=>{ if(!iso) return '—';
  const d=new Date(iso+'T12:00:00');
  return (approx?'~':'')+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); };
const fmtDateShort=iso=>{ if(!iso) return '—'; const d=new Date(iso+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'short',year:'numeric'}); };
const todayISO=()=>new Date().toISOString().slice(0,10);
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2600); }
function carById(id){ return db.cars.find(c=>c.id===id); }
function monogram(car){
  const m=(car.model||'').replace(/[^A-Za-z0-9]/g,'');
  if(m.length>=2) return m.slice(0,2).toUpperCase();
  return (car.name||'?').replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase();
}
function effMileage(car){
  let best={miles:null,date:null};
  if(car.currentMileage!=null && car.currentMileage!=='') best={miles:+car.currentMileage,date:car.currentMileageDate||null};
  for(const e of car.entries) if(e.mileage!=null && (+e.mileage)>(best.miles==null?-1:best.miles)) best={miles:+e.mileage,date:e.date};
  return best;
}
function lastFor(car,tag){
  const list=car.entries.filter(e=>(e.tags||[]).includes(tag)).sort((a,b)=>b.date.localeCompare(a.date));
  return list[0]||null;
}
function dueStatus(car,item){
  const last=lastFor(car,item.tag), cur=effMileage(car), now=new Date();
  if(!last) return {code:'gray',text:'no record yet',lastText:'No record — log one to start tracking.'};
  let milesLeft=null, daysLeft=null, dueMi=null, dueDate=null;
  if(item.miles && last.mileage!=null && cur.miles!=null){ dueMi=(+last.mileage)+(+item.miles); milesLeft=dueMi-cur.miles; }
  if(item.months){ dueDate=new Date(last.date+'T12:00:00'); dueDate.setMonth(dueDate.getMonth()+(+item.months));
    daysLeft=Math.round((dueDate-now)/86400000); }
  const lastText='Last: '+fmtDate(last.date,last.dateApprox)+(last.mileage!=null?' at '+fmtMi(last.mileage)+' mi':'');
  if(milesLeft==null&&daysLeft==null) return {code:'gray',text:'no mileage on last record',lastText,milesLeft,daysLeft,dueDate};
  const overdue=(milesLeft!=null&&milesLeft<=0)||(daysLeft!=null&&daysLeft<=0);
  const soon=(milesLeft!=null&&milesLeft<=1000)||(daysLeft!=null&&daysLeft<=30);
  let text;
  if(milesLeft!=null&&milesLeft<=0) text='overdue by '+fmtMi(-milesLeft)+' mi';
  else if(daysLeft!=null&&daysLeft<=0) text='overdue since '+fmtDateShort(dueDate.toISOString().slice(0,10));
  else{
    const parts=[];
    if(milesLeft!=null) parts.push('in '+fmtMi(milesLeft)+' mi');
    if(daysLeft!=null) parts.push('by '+fmtDateShort(dueDate.toISOString().slice(0,10)));
    text='due '+(parts.join(' or ')||'—');
  }
  return {code: overdue?'red':(soon?'amber':'green'), text, lastText, milesLeft, daysLeft, dueDate};
}
function attention(car){
  return (car.schedule||[]).map(it=>({it,st:dueStatus(car,it)}))
    .filter(x=>x.st.code==='red'||x.st.code==='amber')
    .sort((a,b)=>(a.st.code==='red'?0:1)-(b.st.code==='red'?0:1));
}
/* estimate how many miles/day a car accrues, for projecting mile-based due dates */
function milesPerDay(car){
  const pts=car.entries.filter(e=>e.mileage!=null).map(e=>({d:new Date(e.date+'T12:00:00'),m:+e.mileage}))
    .sort((a,b)=>a.d-b.d);
  if(pts.length<2) return 25;
  const a=pts[Math.max(0,pts.length-6)], b=pts[pts.length-1];
  const days=(b.d-a.d)/86400000;
  if(days<45) return 25;
  return Math.min(150,Math.max(4,(b.m-a.m)/days));
}

/* ============ GitHub sync ============ */
function ghHeaders(){ return {'Authorization':'Bearer '+gh.token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28'}; }
function ghUrl(p){ return 'https://api.github.com/repos/'+gh.owner+'/'+gh.repo+'/contents/'+p; }
function b64encode(str){
  const bytes=new TextEncoder().encode(str); let bin='';
  for(let i=0;i<bytes.length;i+=8192) bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+8192));
  return btoa(bin);
}
function b64decode(b64){
  const bin=atob(b64.replace(/\n/g,'')); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder().decode(bytes);
}
let preflightOk=false;
/* verify the token/repo/branch combo and translate GitHub's vague errors into plain English */
async function preflight(){
  if(preflightOk) return;
  const r=await fetch('https://api.github.com/repos/'+gh.owner+'/'+gh.repo,{headers:ghHeaders()});
  if(r.status===401) throw new Error('GitHub rejected the token. It may be expired or missing characters — paste it again or generate a new one.');
  if(r.status===404) throw new Error('GitHub can’t see “'+gh.owner+'/'+gh.repo+'” with this token. Check (1) username and repo name spelling in Settings, and (2) that the token’s “Repository access” is set to “Only select repositories” with '+gh.repo+' selected — not “Public repositories”.');
  if(!r.ok) throw new Error('GitHub error '+r.status+' while checking the repo.');
  const meta=await r.json();
  if(meta.permissions && !meta.permissions.push)
    throw new Error('The token can read “'+gh.repo+'” but not write to it. Edit the token and set Repository permissions → Contents to “Read and write”.');
  if(meta.default_branch && (gh.branch||'main')!==meta.default_branch){
    const b=await fetch('https://api.github.com/repos/'+gh.owner+'/'+gh.repo+'/branches/'+encodeURIComponent(gh.branch||'main'),{headers:ghHeaders()});
    if(b.status===404){
      gh.branch=meta.default_branch;
      localStorage.setItem(LS_GH,JSON.stringify(gh));
      toast('Branch didn’t exist — switched to “'+meta.default_branch+'”.');
    }
  }
  preflightOk=true;
}
async function ghGetFile(path){
  const r=await fetch(ghUrl(path)+'?ref='+encodeURIComponent(gh.branch||'main'),{headers:ghHeaders()});
  if(r.status===404) return null;
  if(!r.ok) throw new Error('GitHub read failed ('+r.status+')');
  return r.json();
}
async function ghPutFile(path,contentB64,sha,message){
  const body={message:message||'Update garage data',content:contentB64,branch:gh.branch||'main'};
  if(sha) body.sha=sha;
  const r=await fetch(ghUrl(path),{method:'PUT',headers:ghHeaders(),body:JSON.stringify(body)});
  if(!r.ok){ const t=await r.text(); throw new Error('GitHub write failed ('+r.status+'): '+t.slice(0,160)); }
  return r.json();
}
async function pull(){
  if(!gh) return;
  setSync('busy','syncing…');
  try{
    await preflight();
    const f=await ghGetFile(DATA_PATH);
    if(!f){ if(db) await doPush(); else setSync('ok','synced (empty)'); return; }
    ghSha=f.sha;
    const remote=JSON.parse(b64decode(f.content));
    if(!db || (remote.updatedAt||'')>(db.updatedAt||'')){
      db=remote; localStorage.setItem(LS_DATA,JSON.stringify(db));
      setSync('ok','synced'); render();
    } else if((db.updatedAt||'')>(remote.updatedAt||'')){
      await doPush();
    } else setSync('ok','synced');
  }catch(err){ console.error(err); setSync('err','sync error'); toast('Sync error: '+err.message); }
}
function schedulePush(){
  if(!gh) { refreshSyncPill(); return; }
  clearTimeout(pushTimer); setSync('busy','saving…');
  pushTimer=setTimeout(doPush,1200);
}
async function doPush(){
  if(!gh||!db) return;
  setSync('busy','saving…');
  try{
    await preflight();
    await migratePhotos();
    if(ghSha===null){ const f=await ghGetFile(DATA_PATH); ghSha=f?f.sha:undefined; }
    try{
      const res=await ghPutFile(DATA_PATH,b64encode(JSON.stringify(db,null,2)),ghSha,'Update garage data');
      ghSha=res.content.sha;
    }catch(e){ // sha conflict → refetch sha and retry once
      const f=await ghGetFile(DATA_PATH); ghSha=f?f.sha:undefined;
      const res=await ghPutFile(DATA_PATH,b64encode(JSON.stringify(db,null,2)),ghSha,'Update garage data');
      ghSha=res.content.sha;
    }
    setSync('ok','synced');
  }catch(err){ console.error(err); setSync('err','sync error'); toast('Sync error: '+err.message); }
}
/* move any inline (dataUri) photos into the repo once sync is configured */
async function migratePhotos(){
  if(!gh) return;
  for(const car of db.cars){
    if(car.photo && car.photo.dataUri){
      const path='photos/'+car.id+'/car-'+Date.now().toString(36)+'.jpg';
      await ghPutFile(path,car.photo.dataUri.split(',')[1],undefined,'Add car photo');
      car.photo={path:path,name:car.photo.name||'car.jpg'};
    }
    for(const e of car.entries){
      for(let i=0;i<(e.photos||[]).length;i++){
        const p=e.photos[i];
        if(p.dataUri){
          const path='photos/'+car.id+'/'+e.id+'-'+Date.now().toString(36)+'-'+i+'.jpg';
          await ghPutFile(path,p.dataUri.split(',')[1],undefined,'Add photo');
          e.photos[i]={path:path,name:p.name||'photo.jpg'};
        }
      }
    }
  }
  localStorage.setItem(LS_DATA,JSON.stringify(db));
}
async function fetchPhoto(path){
  if(photoCache[path]) return photoCache[path];
  const r=await fetch(ghUrl(path)+'?ref='+encodeURIComponent(gh.branch||'main'),
    {headers:{...ghHeaders(),'Accept':'application/vnd.github.raw+json'}});
  if(!r.ok) throw new Error('photo fetch failed');
  const blob=await r.blob(); const url=URL.createObjectURL(blob);
  photoCache[path]=url; return url;
}
function hydratePhotos(){
  document.querySelectorAll('img[data-ph]').forEach(img=>{
    const path=img.getAttribute('data-ph');
    if(!gh){ img.alt='photo (connect sync to view)'; return; }
    fetchPhoto(path).then(u=>{img.src=u;}).catch(()=>{ img.alt='photo unavailable'; });
  });
}

/* ============ image compression ============ */
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{ const img=new Image();
      img.onload=()=>{
        const MAX=1400; let w=img.width,h=img.height;
        if(Math.max(w,h)>MAX){ const s=MAX/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
        const c=document.createElement('canvas'); c.width=w; c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        resolve(c.toDataURL('image/jpeg',0.8));
      };
      img.onerror=reject; img.src=fr.result; };
    fr.onerror=reject; fr.readAsDataURL(file);
  });
}

/* ============ charts ============ */
function costByYearChart(){
  const byYear={};
  db.cars.forEach(c=>c.entries.forEach(e=>{
    if(e.cost){ const y=e.date.slice(0,4); (byYear[y]=byYear[y]||{})[c.id]=(byYear[y][c.id]||0)+e.cost; }
  }));
  const years=Object.keys(byYear).sort().slice(-8);
  if(!years.length) return '<div class="empty-note">No costs logged yet.</div>';
  const totals=years.map(y=>Object.values(byYear[y]).reduce((a,b)=>a+b,0));
  const rawMax=Math.max(...totals);
  const pow=Math.pow(10,Math.floor(Math.log10(rawMax)));
  const niceMax=[1,2,2.5,5,10].map(m=>m*pow).find(v=>v>=rawMax)||rawMax;
  const W=640,H=230,L=46,R=10,T=12,B=30, PW=W-L-R, PH=H-T-B;
  const slot=PW/years.length, bw=Math.min(44,slot*0.55);
  let svg='';
  for(let g=0;g<=4;g++){
    const y=T+PH-(PH*g/4);
    svg+=`<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#EFEADC" stroke-width="1"/>
      <text x="${L-6}" y="${y+4}" font-size="10" fill="#A29A88" text-anchor="end">${fmtK(niceMax*g/4)}</text>`;
  }
  years.forEach((yr,i)=>{
    const x=L+slot*i+(slot-bw)/2; let yTop=T+PH;
    db.cars.forEach(c=>{
      const v=byYear[yr][c.id]||0; if(!v) return;
      const h=PH*v/niceMax; yTop-=h;
      svg+=`<rect x="${x}" y="${yTop}" width="${bw}" height="${Math.max(1.5,h)}" fill="${c.accent||'#8A8171'}" rx="3"/>`;
    });
    svg+=`<text x="${x+bw/2}" y="${H-10}" font-size="11" fill="#8A8171" text-anchor="middle" font-weight="600">${yr}</text>`;
  });
  const legend=db.cars.map(c=>`<span><i style="background:${c.accent||'#8A8171'}"></i>${esc(c.model||c.name)}</span>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto" font-family="DM Sans,sans-serif">${svg}</svg><div class="legend">${legend}</div>`;
}
function oilCompareHtml(){
  const rows=db.cars.map(c=>{
    const oils=c.entries.filter(e=>(e.tags||[]).includes('oil')&&e.mileage!=null)
      .map(e=>+e.mileage).sort((a,b)=>a-b);
    const count=c.entries.filter(e=>(e.tags||[]).includes('oil')).length;
    let avg=null;
    if(oils.length>=2){
      const gaps=[]; for(let i=1;i<oils.length;i++){const g=oils[i]-oils[i-1]; if(g>500&&g<40000) gaps.push(g);}
      if(gaps.length) avg=gaps.reduce((a,b)=>a+b,0)/gaps.length;

    return {c,avg,count,last};
  });

  </div>`).join('');
}

function categoryDonut(){
  const sums={};
  db.cars.forEach(c=>c.entries.forEach(e=>{
    if(!e.cost) return;
    const tags=(e.tags&&e.tags.length)?e.tags:['other'];
    const share=e.cost/tags.length;
    tags.forEach(t=>{ sums[t]=(sums[t]||0)+share; });
  }));
  const sorted=Object.entries(sums).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length) return '<div class="empty-note">No costs logged yet.</div>';
  const top=sorted.slice(0,5); const other=sorted.slice(5).reduce((s,x)=>s+x[1],0);
  if(other>0) top.push(['other-rest',other]);
  const total=top.reduce((s,x)=>s+x[1],0);
  const R=54, C=2*Math.PI*R; let off=0, segs='';
  top.forEach(([tag,v],i)=>{
    const frac=v/total, len=frac*C;
    segs+=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${DONUT_COLORS[i%DONUT_COLORS.length]}"
      stroke-width="20" stroke-dasharray="${Math.max(0,len-2)} ${C-len+2}" stroke-dashoffset="${-off}" transform="rotate(-90 70 70)"/>`;
    off+=len;
  });
  const legend=top.map(([tag,v],i)=>`<div><span class="lft"><i style="background:${DONUT_COLORS[i%DONUT_COLORS.length]}"></i>${esc(tag==='other-rest'?'Everything else':(TAGL[tag]||tag))}</span><b>${Math.round(100*v/total)}%</b></div>`).join('');
  return `<div class="donut-wrap">
    <svg viewBox="0 0 140 140" style="width:150px;flex:none">
      ${segs}
      <text x="70" y="66" text-anchor="middle" font-size="10" fill="#8A8171" font-family="DM Sans,sans-serif" font-weight="600">ALL-TIME</text>
      <text x="70" y="82" text-anchor="middle" font-size="15" fill="#26231C" font-family="DM Sans,sans-serif" font-weight="800">${fmtK(total)}</text>
    </svg>
    <div class="donut-legend">${legend}</div>
  </div>`;
}
/* upcoming schedule across all cars, projected to dates */
function upcomingItems(){
  const items=[];
  const now=new Date();
  db.cars.forEach(car=>{
    const mpd=milesPerDay(car);
    (car.schedule||[]).forEach(it=>{
      const st=dueStatus(car,it);
      if(st.code==='gray') return;
      let proj=null;
      if(st.dueDate) proj=st.dueDate;
      if(st.milesLeft!=null){
        const d=new Date(now.getTime()+Math.max(0,st.milesLeft)/mpd*86400000);
        if(!proj||d<proj) proj=d;
      }
      items.push({car,it,st,proj});
    });
  });
  items.sort((a,b)=>(a.st.code==='red'?0:1)-(b.st.code==='red'?0:1)||(a.proj-b.proj));
  return items;
}
function upcomingHtml(){
  const items=upcomingItems();
  if(!items.length) return '<div class="empty-note">Nothing scheduled yet.</div>';
  const now=new Date();
  const groups={overdue:[],soon:[],later:[]};
  items.forEach(x=>{
    if(x.st.code==='red') groups.overdue.push(x);
    else if(x.proj-now<90*86400000) groups.soon.push(x);
    else groups.later.push(x);
  });
  const row=x=>`<div class="up-row" onclick="location.hash='#/car/${x.car.id}'">
    <span class="up-when ${x.st.code==='red'?'red':''}">${x.st.code==='red'?'Overdue':'~'+x.proj.toLocaleDateString('en-US',{month:'short',year:'numeric'})}</span>
    <span class="mono-chip" style="background:${x.car.accent||'#8A8171'}">${esc(monogram(x.car))}</span>
    <span class="up-what">${esc(x.it.label)}</span>
    <span class="up-det">${esc(x.st.text)} · ${esc(x.st.lastText)}</span>
  </div>`;
  let html='';
  if(groups.overdue.length) html+=`<div class="up-group"><div class="up-title red">Overdue (${groups.overdue.length})</div>${groups.overdue.map(row).join('')}</div>`;
  if(groups.soon.length) html+=`<div class="up-group"><div class="up-title">Next 90 days</div>${groups.soon.map(row).join('')}</div>`;
  if(groups.later.length) html+=`<div class="up-group"><div class="up-title">Later</div>${groups.later.map(row).join('')}</div>`;
  return html;
}

      <div class="car-body">
        <div class="row">

    const sp=c.entries.reduce((a,e)=>a+(e.cost||0),0);

  $('#app').innerHTML=`
    <div class="hero">
      <div>
        <div class="eyebrow">Garage Dashboard</div>
        <h1>Hi, Brian<span class="accent-dot">.</span></h1>
        <div class="sub">Here’s how the fleet is doing as of ${now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}.</div>
      </div>
      <button class="btn" onclick="A.editCar(null)">+ Add car</button>
    </div>

    <div class="ov-grid">
      <div class="ov sand"><span class="l">Fleet</span><span class="n">${db.cars.length}<span class="unit"> cars</span></span><span class="d">${totalRecords} service records</span></div>
      <div class="ov sage"><span class="l">Spent in ${thisYear}</span><span class="n">${fmtMoney(Math.round(yearSpend))}</span><span class="d">${fmtMoney(Math.round(allSpend))} logged all-time</span></div>
      <div class="ov terra"><span class="l">Needs attention</span><span class="n">${overdueCount}<span class="unit"> overdue</span></span><span class="d">across all cars</span></div>
      <div class="ov stone"><span class="l">Next up</span><span class="n" style="font-size:19px;line-height:1.25">${next?esc(next.it.label):'—'}</span><span class="d">${next?esc(next.car.name)+' · ~'+next.proj.toLocaleDateString('en-US',{month:'short',year:'numeric'}):'nothing scheduled'}</span></div>
    </div>

    <div class="cars-row">${carCards}</div>

    <div class="charts-grid">
      <div class="panel span7">
        <h2>Maintenance cost by year</h2>
        <div class="cap">Logged spend, stacked by car</div>
        ${costByYearChart()}
      </div>
      <div class="dark-card span5">
        <span class="l">Fleet spend</span>
        <div class="big">${fmtMoney(Math.round(allSpend))}</div>
        ${darkRows}
        <div style="margin-top:12px;font-size:11.5px;color:rgba(234,238,221,.55)">Only records with a logged cost are counted.</div>
      </div>
      <div class="panel span6">
        <h2>Oil changes</h2>
        <div class="cap">Average miles between changes</div>
        ${oilCompareHtml()}

        <h2>Tires</h2>
        <div class="cap">Miles on the current set</div>
        ${tiresCompareHtml()}

      <div class="panel span12">
        <h2>Where the money goes</h2>
        <div class="cap">All-time spend by category (records with several categories split the cost evenly)</div>

      <div class="sec-head"><h2>Upcoming schedule</h2><span class="sub">projected from each car’s driving pace</span></div>

}

function entryHtml(car,e){
  const tags=(e.tags||[]).map(t=>`<span class="tag">${esc(TAGL[t]||t)}</span>`).join('');
  const meta=[];
  if(e.mileage!=null) meta.push(fmtMi(e.mileage)+' mi');
  if(e.shop) meta.push(esc(e.shop));
  const photos=(e.photos||[]).map(p=> p.dataUri
    ? `<img src="${p.dataUri}" onclick="event.stopPropagation();A.lightbox(this.src)">`
    : `<img data-ph="${esc(p.path)}" onclick="event.stopPropagation();A.lightboxEl(this)">`).join('');
  return `<div class="entry" onclick="A.editEntry('${car.id}','${e.id}')">
    <div class="e-top">
      <span class="e-date">${fmtDate(e.date,e.dateApprox)}</span>
      <span class="e-title">${esc(e.title)}</span>
      ${e.cost!=null&&e.cost!==''?`<span class="e-cost">${fmtMoney(e.cost)}</span>`:''}
    </div>
    ${meta.length?`<div class="e-meta">${meta.map(m=>`<span>${m}</span>`).join('')}</div>`:''}
    ${e.notes?`<div class="e-notes">${esc(e.notes)}</div>`:''}
    ${tags?`<div class="e-tags">${tags}</div>`:''}
    ${photos?`<div class="e-photos">${photos}</div>`:''}
  </div>`;
}

function renderCar(car){
  const m=effMileage(car);
  const spend=car.entries.reduce((s,e)=>s+(e.cost||0),0);
  const entries=[...car.entries].sort((a,b)=>b.date.localeCompare(a.date));
  const lastSvc=entries[0];
  const usedTags=[...new Set(car.entries.flatMap(e=>e.tags||[]))];
  const q=searchQ.trim().toLowerCase();
  const shown=entries.filter(e=>{
    if(filterTag && !(e.tags||[]).includes(filterTag)) return false;
    if(q){ const blob=(e.title+' '+(e.shop||'')+' '+(e.notes||'')).toLowerCase(); if(!blob.includes(q)) return false; }
    return true;
  });
  const sched=(car.schedule||[]).map(it=>{
    const st=dueStatus(car,it);
    return `<div class="sched-row">
      <span class="what">${esc(it.label)}</span>
      <span class="pill ${st.code}">${esc(st.text)}</span>
      <span class="last">${esc(st.lastText)}${it.miles||it.months?' · every '+[it.miles?fmtMi(it.miles)+' mi':'',it.months?it.months+' mo':''].filter(Boolean).join(' / '):''}</span>
    </div>`;
  }).join('');
  const fields=[
    ['VIN',car.vin],['License plate',car.plate],['Color',car.color],
    ['Insurance company',car.insurance&&car.insurance.company],['Policy #',car.insurance&&car.insurance.policy],
    ['Insurance phone',car.insurance&&car.insurance.phone],['Insurance renewal',car.insurance&&car.insurance.renewal],
    ['Purchased',car.purchase&&(car.purchase.date?fmtDate(car.purchase.date):'')],
    ['Purchase price',car.purchase&&(car.purchase.price!=null?fmtMoney(car.purchase.price):'')],
    ['Purchased from',car.purchase&&car.purchase.from]
  ];
  const dfields=fields.map(([l,v])=>`<div class="dfield"><div class="l">${l}</div><div class="v ${v?'':'empty'}">${esc(v||'not set')}</div></div>`).join('');
  const specs=(car.specs||[]).map(s=>`<div class="dfield"><div class="l">${esc(s.k)}</div><div class="v">${esc(s.v)}</div></div>`).join('');
  $('#app').innerHTML=`
    <a class="crumb" href="#/">← All cars</a>
    <div class="chero">
      <div class="chero-photo" style="background:${PHOTO_BG[car.id]||'var(--stone)'}">
        ${carPhotoHtml(car)}
        <button class="photobtn" onclick="A.setCarPhoto('${car.id}')">${car.photo?'Change photo':'+ Add photo'}</button>
      </div>
      <div class="chero-info">
        <div style="display:flex;gap:10px;align-items:center">
          <span class="mono-chip" style="background:${esc(car.accent||'#8A8171')};min-width:44px;height:28px;font-size:13px">${esc(monogram(car))}</span>
          ${car.vin?`<span class="sub">VIN ${esc(car.vin)}</span>`:''}
        </div>
        <h1>${esc(car.name)}</h1>
        <div class="chero-actions">
          <button class="btn primary" onclick="A.editEntry('${car.id}',null)">+ Log service</button>
          <button class="btn" onclick="A.updateMileage('${car.id}')">Update mileage</button>
          <button class="btn" onclick="A.editCar('${car.id}')">Edit details</button>
        </div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat sand"><div class="n">${m.miles!=null?fmtMi(m.miles):'—'}</div><div class="l">miles · ${m.date?fmtDateShort(m.date):'unknown'}</div></div>
      <div class="stat sage"><div class="n">${lastSvc?fmtDateShort(lastSvc.date):'—'}</div><div class="l">last service</div></div>
      <div class="stat terra"><div class="n">${spend?fmtMoney(Math.round(spend)):'—'}</div><div class="l">logged spend</div></div>
      <div class="stat stone"><div class="n">${car.entries.length}</div><div class="l">records</div></div>
    </div>

    <section>
      <div class="sec-head"><h2>What’s due</h2>
        <button class="btn small" onclick="A.editSchedule('${car.id}')">Edit intervals</button></div>
      ${sched?`<div class="sched">${sched}</div>`:'<div class="empty-note">No maintenance schedule yet — add intervals to start tracking.</div>'}
    </section>

    <section>
      <div class="sec-head"><h2>Service history</h2></div>
      <div class="filters">
        <input class="search" placeholder="Search…" value="${esc(searchQ)}"
          oninput="A.search('${car.id}',this.value)">
        ${usedTags.map(t=>`<span class="chip ${filterTag===t?'on':''}" onclick="A.filter('${car.id}','${t}')">${esc(TAGL[t]||t)}</span>`).join('')}
      </div>
      <div id="entryList">
      ${shown.length?shown.map(e=>entryHtml(car,e)).join(''):'<div class="empty-note">No records match.</div>'}
      </div>
    </section>

    <section>
      <div class="sec-head"><h2>Vehicle details</h2>
        <button class="btn small" onclick="A.editCar('${car.id}')">Edit details</button></div>
      <div class="details-grid">${dfields}${specs}</div>
      ${(car.purchase&&car.purchase.notes)?`<div class="car-notes"><strong>Purchase notes:</strong> ${esc(car.purchase.notes)}</div>`:''}
      ${car.notes?`<div class="car-notes">${esc(car.notes)}</div>`:''}
    </section>`;
}

/* ============ modals ============ */
function openModal(html){ $('#modalRoot').innerHTML=`<div class="overlay" onclick="if(event.target===this)A.closeModal()"><div class="modal">${html}</div></div>`; }
function closeModal(){ $('#modalRoot').innerHTML=''; pendingPhotos=[]; }

/* ============ actions ============ */
const A={
  closeModal,
  lightbox(src){ $('#modalRoot').innerHTML=`<div class="lightbox" onclick="A.closeModal()"><img src="${src}"></div>`; },
  lightboxEl(img){ if(img.src) A.lightbox(img.src); },
  filter(carId,t){ filterTag=(filterTag===t?null:t); renderCar(carById(carId)); hydratePhotos(); },
  search(carId,v){ searchQ=v; const car=carById(carId);
    const q=v.trim().toLowerCase();
    const entries=[...car.entries].sort((a,b)=>b.date.localeCompare(a.date)).filter(e=>{
      if(filterTag && !(e.tags||[]).includes(filterTag)) return false;
      if(q){ const blob=(e.title+' '+(e.shop||'')+' '+(e.notes||'')).toLowerCase(); if(!blob.includes(q)) return false; }
      return true;});
    $('#entryList').innerHTML=entries.length?entries.map(e=>entryHtml(car,e)).join(''):'<div class="empty-note">No records match.</div>';
    hydratePhotos(); },

  startFresh(){ db={version:1,updatedAt:new Date().toISOString(),cars:[]}; save(); },

  importFile(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
    inp.onchange=()=>{ const f=inp.files[0]; if(!f) return;
      const fr=new FileReader();
      fr.onload=()=>{ try{
          const data=JSON.parse(fr.result);
          if(!data.cars) throw new Error('Not a garage data file.');
          db=data; save(); toast('Imported '+db.cars.length+' cars, '+db.cars.reduce((s,c)=>s+c.entries.length,0)+' records.');
        }catch(e){ alert('Could not import: '+e.message); } };
      fr.readAsText(f); };
    inp.click();
  },
  exportFile(){
    const blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='garage-backup-'+todayISO()+'.json'; a.click();
  },

  updateMileage(carId){
    const car=carById(carId); const m=effMileage(car);
    const v=prompt('Current mileage for '+car.name+':', m.miles!=null?m.miles:'');
    if(v==null||v.trim()==='') return;
    const n=parseInt(v.replace(/[^\d]/g,''),10);
    if(isNaN(n)){ alert('Please enter a number.'); return; }
    car.currentMileage=n; car.currentMileageDate=todayISO(); save(); toast('Mileage updated.');
  },

  setCarPhoto(carId){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange=async()=>{
      const f=inp.files[0]; if(!f) return;
      try{
        const dataUri=await compressImage(f);
        carById(carId).photo={dataUri,name:f.name};
        save(); toast('Photo added.');
      }catch(e){ alert('Could not read that image.'); }
    };
    inp.click();
  },

  /* ----- entry form ----- */
  editEntry(carId,entryId){
    const car=carById(carId);
    const e=entryId?car.entries.find(x=>x.id===entryId):null;
    pendingPhotos=[];
    const tags=(e&&e.tags)||[];
    openModal(`
      <h2>${e?'Edit record':'Log service'} — ${esc(car.name)}</h2>
      <div class="f-cols">
        <div class="f-row"><label>Date</label><input type="date" id="f-date" value="${e?e.date:todayISO()}"></div>
        <div class="f-row"><label>Mileage</label><input type="number" id="f-mileage" placeholder="e.g. 114500" value="${e&&e.mileage!=null?e.mileage:''}"></div>
      </div>
      <div class="f-row"><label>What was done</label><input type="text" id="f-title" placeholder="e.g. Oil change + tire rotation" value="${esc(e?e.title:'')}"></div>
      <div class="f-cols">
        <div class="f-row"><label>Shop</label><input type="text" id="f-shop" value="${esc(e?e.shop||'':'')}"></div>
        <div class="f-row"><label>Cost ($)</label><input type="number" step="0.01" id="f-cost" value="${e&&e.cost!=null?e.cost:''}"></div>
      </div>
      <div class="f-row"><label>Categories</label>
        <div class="tagpick">${VOCAB.map(([t,l])=>`
          <label class="${tags.includes(t)?'on':''}"><input type="checkbox" value="${t}" ${tags.includes(t)?'checked':''}
            onchange="this.parentElement.classList.toggle('on',this.checked)">${l}</label>`).join('')}
        </div></div>
      <div class="f-row"><label>Notes</label><textarea id="f-notes">${esc(e?e.notes||'':'')}</textarea></div>
      <div class="f-row"><label>Photos / receipts</label>
        <div class="photo-edit" id="f-photos">
          ${e?(e.photos||[]).map((p,i)=>`<div class="ph" data-keep="${i}">
              ${p.dataUri?`<img src="${p.dataUri}">`:`<img data-ph="${esc(p.path)}">`}
              <button class="rm" onclick="this.parentElement.remove()">✕</button></div>`).join(''):''}
        </div>
        <button class="btn small" style="margin-top:8px" onclick="A.pickPhotos()">+ Add photos</button>
        <div class="hint">${gh?'Photos are saved to your private GitHub repo.':'Photos are stored locally until you connect GitHub sync (Settings).'}</div>
      </div>
      <div class="modal-actions">
        ${e?`<button class="btn danger" onclick="A.deleteEntry('${carId}','${e.id}')">Delete</button>`:''}
        <span class="spacer"></span>
        <button class="btn" onclick="A.closeModal()">Cancel</button>
        <button class="btn primary" onclick="A.saveEntry('${carId}','${e?e.id:''}')">Save</button>
      </div>`);
    hydratePhotos();
  },
  pickPhotos(){
    const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.multiple=true;
    inp.onchange=async()=>{
      for(const f of inp.files){
        try{ const dataUri=await compressImage(f);
          pendingPhotos.push({dataUri,name:f.name});
          const div=document.createElement('div'); div.className='ph'; div.dataset.pending=pendingPhotos.length-1;
          div.innerHTML=`<img src="${dataUri}"><button class="rm" onclick="this.parentElement.remove()">✕</button>`;
          $('#f-photos').appendChild(div);
        }catch(e){ alert('Could not read image '+f.name); }
      }};
    inp.click();
  },
  async saveEntry(carId,entryId){
    const car=carById(carId);
    const date=$('#f-date').value, title=$('#f-title').value.trim();
    if(!date||!title){ alert('Date and description are required.'); return; }
    const mileage=$('#f-mileage').value?parseInt($('#f-mileage').value,10):null;
    const shop=$('#f-shop').value.trim();
    const cost=$('#f-cost').value!==''?parseFloat($('#f-cost').value):null;
    const notes=$('#f-notes').value.trim();
    const tags=[...document.querySelectorAll('.tagpick input:checked')].map(i=>i.value);
    const old=entryId?car.entries.find(x=>x.id===entryId):null;
    const photos=[];
    document.querySelectorAll('#f-photos .ph').forEach(div=>{
      if(div.dataset.keep!=null && old) photos.push(old.photos[+div.dataset.keep]);
      else if(div.dataset.pending!=null) photos.push(pendingPhotos[+div.dataset.pending]);
    });
    const entry={id:entryId||uid(),date,title,tags,photos};
    if(old&&old.dateApprox&&old.date===date) entry.dateApprox=true;
    if(mileage!=null&&!isNaN(mileage)) entry.mileage=mileage;
    if(shop) entry.shop=shop;
    if(cost!=null&&!isNaN(cost)) entry.cost=cost;
    if(notes) entry.notes=notes;
    if(old) car.entries[car.entries.indexOf(old)]=entry; else car.entries.push(entry);
    closeModal(); save(); toast(old?'Record updated.':'Service logged.');
  },
  deleteEntry(carId,entryId){
    if(!confirm('Delete this record?')) return;
    const car=carById(carId);
    car.entries=car.entries.filter(e=>e.id!==entryId);
    closeModal(); save(); toast('Record deleted.');
  },

  /* ----- car form ----- */
  editCar(carId){
    const car=carId?carById(carId):null;
    const ins=(car&&car.insurance)||{}, pur=(car&&car.purchase)||{};
    openModal(`
      <h2>${car?'Edit '+esc(car.name):'Add a car'}</h2>
      <div class="f-row"><label>Name</label><input type="text" id="c-name" placeholder="e.g. 2018 Volvo XC60" value="${esc(car?car.name:'')}"></div>
      <div class="f-cols">
        <div class="f-row"><label>VIN</label><input type="text" id="c-vin" value="${esc(car?car.vin||'':'')}"></div>
        <div class="f-row"><label>License plate</label><input type="text" id="c-plate" value="${esc(car?car.plate||'':'')}"></div>
      </div>
      <div class="f-row"><label>Color / trim</label><input type="text" id="c-color" value="${esc(car?car.color||'':'')}"></div>
      <div class="f-cols">
        <div class="f-row"><label>Insurance company</label><input type="text" id="c-insco" value="${esc(ins.company||'')}"></div>
        <div class="f-row"><label>Policy #</label><input type="text" id="c-inspol" value="${esc(ins.policy||'')}"></div>
        <div class="f-row"><label>Insurance phone</label><input type="text" id="c-insph" value="${esc(ins.phone||'')}"></div>
        <div class="f-row"><label>Renewal date</label><input type="text" id="c-insrn" placeholder="e.g. 2026-11-01" value="${esc(ins.renewal||'')}"></div>
      </div>
      <div class="f-cols">
        <div class="f-row"><label>Purchase date</label><input type="date" id="c-pdate" value="${esc(pur.date||'')}"></div>
        <div class="f-row"><label>Purchase price ($)</label><input type="number" id="c-pprice" value="${pur.price!=null?pur.price:''}"></div>
      </div>
      <div class="f-row"><label>Purchased from</label><input type="text" id="c-pfrom" value="${esc(pur.from||'')}"></div>
      <div class="f-row"><label>Purchase notes</label><textarea id="c-pnotes">${esc(pur.notes||'')}</textarea></div>
      <div class="f-row"><label>Specs &amp; part numbers</label><div id="c-specs">
        ${((car&&car.specs)||[]).map(s=>`<div class="kvrow"><input placeholder="Label" value="${esc(s.k)}"><input placeholder="Value" value="${esc(s.v)}"><button class="rm" onclick="this.parentElement.remove()">✕</button></div>`).join('')}
      </div><button class="btn small" onclick="A.addSpecRow()">+ Add spec</button></div>
      <div class="f-row"><label>Notes</label><textarea id="c-notes">${esc(car?car.notes||'':'')}</textarea></div>
      <div class="modal-actions">
        ${car?`<button class="btn danger" onclick="A.deleteCar('${car.id}')">Delete car</button>`:''}
        <span class="spacer"></span>
        <button class="btn" onclick="A.closeModal()">Cancel</button>
        <button class="btn primary" onclick="A.saveCar('${car?car.id:''}')">Save</button>
      </div>`);
  },
  addSpecRow(){
    const div=document.createElement('div'); div.className='kvrow';
    div.innerHTML=`<input placeholder="Label"><input placeholder="Value"><button class="rm" onclick="this.parentElement.remove()">✕</button>`;
    $('#c-specs').appendChild(div);
  },
  saveCar(carId){
    const name=$('#c-name').value.trim();
    if(!name){ alert('Name is required.'); return; }
    let car=carId?carById(carId):null;
    if(!car){
      car={id:'c'+Date.now().toString(36),name:'',accent:['#2F5D50','#7D2E2E','#3E4C6D','#6B5B3E','#5A3E6B','#3E6B69'][db.cars.length%6],
        insurance:{},purchase:{},specs:[],notes:'',currentMileage:null,currentMileageDate:'',
        schedule:[{label:'Oil change',tag:'oil',miles:5000,months:6},{label:'Tire rotation',tag:'tire-rotation',miles:5000,months:6},
          {label:'Cabin air filter',tag:'cabin-filter',miles:15000,months:12},{label:'Engine air filter',tag:'engine-filter',miles:30000,months:24},
          {label:'Wiper blades',tag:'wipers',miles:null,months:12}],
        entries:[]};
      db.cars.push(car);
    }
    car.name=name; car.vin=$('#c-vin').value.trim(); car.plate=$('#c-plate').value.trim(); car.color=$('#c-color').value.trim();
    // keep model fresh for the monogram: infer from name if model is missing
    if(!car.model){ const mm=name.match(/([A-Za-z]{2}[A-Za-z0-9]*)\s*$/); if(mm) car.model=mm[1]; }
    car.insurance={company:$('#c-insco').value.trim(),policy:$('#c-inspol').value.trim(),phone:$('#c-insph').value.trim(),renewal:$('#c-insrn').value.trim()};
    car.purchase={date:$('#c-pdate').value,price:$('#c-pprice').value!==''?parseFloat($('#c-pprice').value):null,
      from:$('#c-pfrom').value.trim(),notes:$('#c-pnotes').value.trim()};
    car.specs=[...document.querySelectorAll('#c-specs .kvrow')].map(r=>{
      const [k,v]=r.querySelectorAll('input'); return {k:k.value.trim(),v:v.value.trim()};
    }).filter(s=>s.k||s.v);
    car.notes=$('#c-notes').value.trim();
    closeModal(); save(); toast('Saved.');
  },
  deleteCar(carId){
    const car=carById(carId);
    if(!confirm('Delete '+car.name+' and all its '+car.entries.length+' records? This cannot be undone (except via a backup or GitHub history).')) return;
    db.cars=db.cars.filter(c=>c.id!==carId);
    closeModal(); location.hash='#/'; save(); toast('Car deleted.');
  },

  /* ----- schedule editor ----- */
  editSchedule(carId){
    const car=carById(carId);
    openModal(`
      <h2>Maintenance intervals — ${esc(car.name)}</h2>
      <div class="hint" style="margin-bottom:12px">Each item is matched to history records by its category. Leave miles or months blank to skip that trigger.</div>
      <div class="schedrow" style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">
        <span>Label</span><span>Category</span><span>Miles</span><span>Months</span><span></span></div>
      <div id="s-rows">
        ${(car.schedule||[]).map(it=>A._schedRowHtml(it)).join('')}
      </div>
      <button class="btn small" onclick="A.addSchedRow()">+ Add item</button>
      <div class="modal-actions">
        <button class="btn" onclick="A.closeModal()">Cancel</button>
        <button class="btn primary" onclick="A.saveSchedule('${carId}')">Save</button>
      </div>`);
  },
  _schedRowHtml(it){
    it=it||{label:'',tag:'other',miles:'',months:''};
    return `<div class="schedrow">
      <input placeholder="Label" value="${esc(it.label)}">
      <select>${VOCAB.map(([t,l])=>`<option value="${t}" ${it.tag===t?'selected':''}>${l}</option>`).join('')}</select>
      <input type="number" placeholder="mi" value="${it.miles!=null?it.miles:''}">
      <input type="number" placeholder="mo" value="${it.months!=null?it.months:''}">
      <button class="rm" style="border:none;background:none;color:var(--muted);cursor:pointer" onclick="this.parentElement.remove()">✕</button>
    </div>`;
  },
  addSchedRow(){ $('#s-rows').insertAdjacentHTML('beforeend',A._schedRowHtml()); },
  saveSchedule(carId){
    const car=carById(carId);
    car.schedule=[...document.querySelectorAll('#s-rows .schedrow')].map(r=>{
      const inputs=r.querySelectorAll('input'), sel=r.querySelector('select');
      return {label:inputs[0].value.trim(),tag:sel.value,
        miles:inputs[1].value!==''?parseInt(inputs[1].value,10):null,
        months:inputs[2].value!==''?parseInt(inputs[2].value,10):null};
    }).filter(it=>it.label);
    closeModal(); save(); toast('Intervals updated.');
  },

  /* ----- settings ----- */
  openSettings(){
    const g=gh||{owner:'',repo:'',branch:'main',token:''};
    openModal(`
      <h2>Settings &amp; sync</h2>
      <div class="hint" style="margin-bottom:14px">Connect a <strong>private</strong> GitHub repo to sync your data and photos across devices. Every save becomes a commit — your full history is kept forever. See the README for the 10-minute setup.</div>
      <div class="f-cols">
        <div class="f-row"><label>GitHub username</label><input type="text" id="g-owner" placeholder="your-username" value="${esc(g.owner)}"></div>
        <div class="f-row"><label>Data repo name</label><input type="text" id="g-repo" placeholder="garage-data" value="${esc(g.repo)}"></div>
      </div>
      <div class="f-cols">
        <div class="f-row"><label>Branch</label><input type="text" id="g-branch" value="${esc(g.branch||'main')}"></div>
        <div class="f-row"><label>Access token</label><input type="password" id="g-token" placeholder="github_pat_…" value="${esc(g.token)}"></div>
      </div>
      <div class="hint">The token is stored only in this browser, never in the synced data.</div>
      <div class="modal-actions" style="justify-content:flex-start">
        <button class="btn primary" onclick="A.saveSettings()">Save &amp; sync</button>
        ${gh?`<button class="btn" onclick="A.syncNow()">Sync now</button>
        <button class="btn danger" onclick="A.disconnect()">Disconnect</button>`:''}
      </div>
      <hr style="border:none;border-top:1px solid var(--line);margin:18px 0">
      <div class="f-row"><label>Backup</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn" onclick="A.exportFile()">Export data file</button>
          <button class="btn" onclick="A.importFile()">Import data file</button>
        </div>
        <div class="hint">Export a JSON backup any time. Import replaces what’s on this device.</div>
      </div>
      <div class="modal-actions"><button class="btn" onclick="A.closeModal()">Close</button></div>`);
  },
  saveSettings(){
    let owner=$('#g-owner').value.trim(), repo=$('#g-repo').value.trim();
    const branch=$('#g-branch').value.trim()||'main', token=$('#g-token').value.trim();
    // forgive pasting a full URL or "username/repo" into the repo field
    repo=repo.replace(/^https?:\/\/(www\.)?github\.com\//i,'').replace(/\.git$/,'').replace(/\/+$/,'');
    if(repo.includes('/')){ const parts=repo.split('/'); owner=parts[0]; repo=parts[1]; }
    owner=owner.replace(/^https?:\/\/(www\.)?github\.com\//i,'').replace(/^@/,'').replace(/\/+$/,'');
    if(!owner||!repo||!token){ alert('Username, repo, and token are all required.'); return; }
    gh={owner,repo,branch,token}; ghSha=null; preflightOk=false;
    localStorage.setItem(LS_GH,JSON.stringify(gh));
    closeModal(); toast('Connecting…'); pull();
  },
  syncNow(){ closeModal(); pull(); },
  disconnect(){
    if(!confirm('Disconnect GitHub sync? Your data stays on this device and in the repo; they just stop syncing.')) return;
    gh=null; ghSha=null; preflightOk=false; localStorage.removeItem(LS_GH);
    closeModal(); refreshHeaderPill(); toast('Disconnected.');
  }
};
window.A=A;

/* ============ boot ============ */
render();
if(gh) pull();
</script>
</body>
</html>
